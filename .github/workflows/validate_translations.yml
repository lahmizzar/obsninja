name: Validate translations

on:
  push:
    branches:
      - develop
    paths:
      - "translations/*.json"
  pull_request:
    branches:
      - develop
    paths:
      - "translations/*.json"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate translations
        run: node .github/ci-validateTranslations.js
